
services:
  qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: scholar_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
    restart: unless-stopped

  grobid:
    image: lfoppiano/grobid:0.8.0
    container_name: scholar_grobid
    ports:
      - "8070:8070"
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    container_name: scholar_mlflow
    ports:
      - "5001:5000"
    volumes:
      - mlflow_data:/mlflow
    command:
      - mlflow
      - server
      - --backend-store-uri
      - sqlite:////mlflow/mlflow.db
      - --default-artifact-root
      - /mlflow/artifacts
      - --host
      - "0.0.0.0"
    restart: unless-stopped

volumes:
  qdrant_data:
  mlflow_data:
